name: OpenGet nightly scoring

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: openget-nightly-scoring
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install script dependencies
        working-directory: scripts
        run: npm ci

      - name: Trigger nightly scoring through openget-api
        working-directory: scripts
        env:
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          OPENGET_ACTION: fetch-contributors
        run: |
          if [ -z "${APPWRITE_API_KEY}" ]; then
            echo "APPWRITE_API_KEY not set, skipping scheduled run."
            exit 0
          fi
          node run-openget-action.js
